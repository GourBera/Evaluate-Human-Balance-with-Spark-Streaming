# =============================================================================
# STEDI Human Balance – Evaluation with Spark Streaming
# Docker Compose configuration
# =============================================================================
# Services:
#   1. redis               – Redis 6 key-value store (Kafka source)
#   2. zookeeper           – Kafka coordination service
#   3. kafka               – Kafka broker (Confluent Platform 6.2)
#   4. kafka-init          – One-shot container that creates all Kafka topics
#   5. kafka-connect       – Confluent Connect + Redis Source Connector
#   6. stedi               – STEDI app simulation (Redis + Kafka data generator)
#   7. stedi-graph         – Live graph for customer-risk topic
#   8. banking-simulation  – Banking transaction data generator
#   9. trucking-simulation – Trucking telemetry data generator
#  10. spark-master        – Apache Spark master node (Spark 2.4.8)
#  11. spark-worker        – Apache Spark worker node
#
# Usage:
#   cp .env.example .env   # fill in any custom values
#   docker compose up
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # 1. Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:6.2-alpine
    container_name: stedi-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass "${REDIS_PASSWORD:-notreally}"
        --notify-keyspace-events KEA
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-notreally}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stedi-net

  # ---------------------------------------------------------------------------
  # 2. Zookeeper
  # ---------------------------------------------------------------------------
  zookeeper:
    image: zookeeper:3.9
    container_name: stedi-zookeeper
    restart: unless-stopped
    environment:
      ZOO_STANDALONE_ENABLED: "true"
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - stedi-net

  # ---------------------------------------------------------------------------
  # 3. Kafka
  # ---------------------------------------------------------------------------
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.13
    container_name: stedi-kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:19092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://kafka:19092,external://localhost:${KAFKA_EXTERNAL_PORT:-9092}
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "rpk", "topic", "list", "--brokers", "kafka:19092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - stedi-net

  # ---------------------------------------------------------------------------
  # 4. Kafka init – create all required topics (one-shot)
  # ---------------------------------------------------------------------------
  kafka-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.13
    container_name: stedi-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: "kafka:19092"
    volumes:
      - ./kafka/kafka-create-topics.sh:/kafka-create-topics.sh:ro
    entrypoint: ["/bin/bash", "/kafka-create-topics.sh"]
    networks:
      - stedi-net

  # ---------------------------------------------------------------------------
  # 5. Kafka Connect (with Redis Source Connector)
  # ---------------------------------------------------------------------------
  kafka-connect:
    image: alpine:3.20
    container_name: stedi-kafka-connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "echo 'Kafka Connect placeholder: redis-server events are produced by stedi simulator on ARM hosts'; tail -f /dev/null"]
    networks:
      - stedi-net

  # ---------------------------------------------------------------------------
  # 6. STEDI Simulation - Create data in Redis and produce events to Kafka (Python app)
  # ---------------------------------------------------------------------------
  stedi:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: stedi-app
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-notreally}"
      KAFKA_BROKER: "${KAFKA_BROKER:-kafka:19092}"
      KAFKA_TOPIC_STEDI_EVENTS: "${KAFKA_TOPIC_STEDI_EVENTS:-stedi-events}"
    command: ["python", "stedi-simulation.py"]
    networks:
      - stedi-net

  # ---------------------------------------------------------------------------
  # 7. STEDI Graph UI
  # ---------------------------------------------------------------------------
  stedi-graph:
    build:
      context: .
      dockerfile: Dockerfile.graph
    container_name: stedi-graph
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BROKER: "${KAFKA_BROKER:-kafka:19092}"
      KAFKA_TOPIC_CUSTOMER_RISK: "${KAFKA_TOPIC_CUSTOMER_RISK:-customer-risk}"
      GRAPH_PORT: "8080"
    ports:
      - "${STEDI_GRAPH_PORT:-3000}:8080"
    networks:
      - stedi-net

  # ---------------------------------------------------------------------------
  # 7. Banking Simulation
  # ---------------------------------------------------------------------------
  banking-simulation:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: stedi-banking-sim
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BROKER: "${KAFKA_BROKER:-kafka:19092}"
    command: ["python", "banking-simulation.py"]
    networks:
      - stedi-net

  # ---------------------------------------------------------------------------
  # 8. Trucking Simulation
  # ---------------------------------------------------------------------------
  trucking-simulation:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: stedi-trucking-sim
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BROKER: "${KAFKA_BROKER:-kafka:19092}"
    command: ["python", "trucking-simulation.py"]
    networks:
      - stedi-net

  # ---------------------------------------------------------------------------
  # 9. Spark Master
  # ---------------------------------------------------------------------------
  spark-master:
    image: bde2020/spark-master:2.4.5-hadoop2.7
    platform: linux/amd64
    container_name: stedi-spark-master
    restart: unless-stopped
    environment:
      INIT_DAEMON_STEP: setup_spark
      KAFKA_BROKER: "${KAFKA_BROKER:-kafka:19092}"
    ports:
      - "${SPARK_MASTER_UI_PORT:-8080}:8080"
      - "${SPARK_MASTER_PORT:-7077}:7077"
    volumes:
      - .:/home/workspace
    networks:
      - stedi-net

  # ---------------------------------------------------------------------------
  # 10. Spark Worker
  # ---------------------------------------------------------------------------
  spark-worker:
    image: bde2020/spark-worker:2.4.5-hadoop2.7
    platform: linux/amd64
    container_name: stedi-spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      SPARK_MASTER: "spark://spark-master:${SPARK_MASTER_PORT:-7077}"
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_CORES: 2
      KAFKA_BROKER: "${KAFKA_BROKER:-kafka:19092}"
    ports:
      - "${SPARK_WORKER_UI_PORT:-8081}:8081"
    volumes:
      - .:/home/workspace
    networks:
      - stedi-net

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  stedi-net:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  redis-data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
